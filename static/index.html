<!DOCTYPE html>
<html lang="en" class="dark theme-supabase">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Read the Bible 📖</title>
    <link rel="icon" href="favicon.ico">

    <!-- miso.ui / Basecoat stylesheet (Supabase theme, dark mode), pinned
         to a miso.ui commit via jsDelivr so no CSS lives in this repo. -->
    <link href="https://cdn.jsdelivr.net/gh/haskell-miso/miso.ui@b0337fcdc576b9b1f280dee2f040d26d1107b9aa/assets/styles.css" rel="stylesheet">

    <style>
      /* The few layout bits the compiled miso.ui stylesheet doesn't cover. */
      .centered {
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 1rem;
      }
      .app { max-width: 62rem; }
      .controls {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .controls :is(select, input, button) { width: 100%; }
      @media (min-width: 48rem) {
        .controls {
          flex-direction: row;
          flex-wrap: wrap;
          align-items: flex-end;
          justify-content: center;
        }
        /* Basecoat's .field is width:100%; shrink everything back to its
           content so all controls share one row when there is space. */
        .controls .field,
        .controls :is(select, input, button) { width: fit-content; }
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
      }
      .chart-wrap {
        min-height: 220px;
        justify-content: safe center;
      }
      .spinner {
        border: 3px solid var(--border);
        border-top-color: var(--primary);
      }
      /* Google Charts tooltips should look like a themed popover. */
      .google-visualization-tooltip {
        background: var(--popover) !important;
        border: 1px solid var(--border) !important;
        border-radius: var(--radius) !important;
        color: var(--foreground) !important;
        box-shadow: var(--shadow-md) !important;
      }
      .google-visualization-tooltip * {
        color: var(--foreground) !important;
      }
    </style>

    <script>
      // Dark (Supabase) is the default; restore a stored light preference
      // before first paint. appToggleTheme is called from Haskell.
      (() => {
        try {
          const stored = localStorage.getItem('themeMode');
          if (stored) document.documentElement.classList.toggle('dark', stored === 'dark');
        } catch (_) {}
      })();
      globalThis.appIsDark = () => document.documentElement.classList.contains('dark');
      globalThis.appToggleTheme = () => {
        const dark = !globalThis.appIsDark();
        document.documentElement.classList.toggle('dark', dark);
        try { localStorage.setItem('themeMode', dark ? 'dark' : 'light'); } catch (_) {}
        return dark;
      };
    </script>

    <!-- Google Charts loader (calendar package) -->
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <script>
      google.charts.load('current', { packages: ['calendar'] });
    </script>

    <script type="module">
      import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

      const supabase_url = 'https://ljknwlqyxougfijkyybq.supabase.co';
      const supabase_key = 'sb_publishable_Ga2P7LzIDbJjbq3kka6-Ag_eYd91LLk';
      const supabase = createClient(supabase_url, supabase_key);
      globalThis['supabase'] = supabase;

      /* ------------------------------------------------------------------ *
       * supabase-miso glue (mirrors js/supabase-miso.js from the library;  *
       * the library only ships it via cabal js-sources, which the WASM     *
       * backend does not include, so it lives here instead).               *
       * ------------------------------------------------------------------ */

      // usage: runSupabase('auth', 'signUp', args, successCallback, errorCallback)
      globalThis['runSupabase'] = function (namespace, fnName, args, successful, errorful) {
        globalThis['supabase'][namespace][fnName](...args).then(({ data, error }) => {
          if (data) successful(data);
          if (error) errorful(error);
        });
      };

      globalThis['runSupabaseFrom'] = function (namespace, fromArg, fnName, args, successful, errorful) {
        globalThis['supabase'][namespace]
          .from(fromArg)
          [fnName](...args)
          .then(({ data, error }) => {
            if (data) successful(data);
            if (error) errorful(error);
          });
      };

      globalThis['runSupabaseQuery'] = function (from, fnName, args, successful, errorful) {
        globalThis['supabase']
          .from(from)
          [fnName](...args)
          .then(({ data, error }) => {
            if (data) successful(data);
            if (error) errorful(error);
          });
      };

      globalThis['runSupabaseSelect'] = function (table, columns, args, successful, errorful) {
        let query = globalThis['supabase'].from(table).select(columns);

        const filters = args[0] || [];
        const fetchOptions = args[1] || {};

        filters.forEach((filter) => {
          query = query[filter.operator](filter.column, filter.value);
        });

        if (fetchOptions.count) query = query.count(fetchOptions.count);
        if (fetchOptions.head) query = query.head();

        query.then((result) => {
          if (result.error) {
            errorful(result.error.message);
          } else {
            successful(result.data);
          }
        });
      };

      globalThis['runSupabaseUpdate'] = function (table, values, filters, options, successful, errorful) {
        let query = globalThis['supabase'].from(table).update(values, options);

        filters.forEach((filter) => {
          query = query[filter.operator](filter.column, filter.value);
        });

        query.then(({ data, error }) => {
          if (data) successful(data);
          if (error) errorful(error);
        });
      };

      globalThis['runSupabaseDelete'] = function (table, args, successful, errorful) {
        let query = globalThis['supabase'].from(table).delete();

        const filters = args[0] || [];
        const deleteOptions = args[1] || {};

        filters.forEach((filter) => {
          query = query[filter.operator](filter.column, filter.value);
        });

        if (deleteOptions.count) query = query.count(deleteOptions.count);

        query.then((result) => {
          if (result.error) {
            errorful(result.error.message);
          } else {
            successful(result.data);
          }
        });
      };

      /* ------------------------------------------------------------------ *
       * App-specific helpers (see src/Interop.hs for why these exist).     *
       * ------------------------------------------------------------------ */

      // Insert a reading and return the created row (so Haskell learns its id).
      globalThis['appInsertReading'] = function (row, successful, errorful) {
        supabase
          .from('readings')
          .insert(row)
          .select()
          .single()
          .then(({ data, error }) => {
            if (error) errorful(error.message);
            else successful(data);
          });
      };

      // signOut() resolves with { error } only, so the generic glue above
      // would never fire a callback for it.
      globalThis['appSignOut'] = function (successful, errorful) {
        supabase.auth.signOut().then(({ error }) => {
          if (error) errorful(error.message);
          else successful(null);
        });
      };

      // OAuth redirect flow; on success the browser navigates away.
      globalThis['appSignInGoogle'] = function (errorful) {
        supabase.auth
          .signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin + window.location.pathname },
          })
          .then(({ error }) => {
            if (error) errorful(error.message);
          });
      };

      /* ------------------------------------------------------------------ *
       * Google Charts calendar (options ported from the Svelte app).       *
       * ------------------------------------------------------------------ */

      // Colors are hex approximations of the theme-supabase CSS variables in
      // styles.css (Google Charts can't read oklch() vars). cellStroke tracks
      // the card background the chart sits on; #3ecf8e is the Supabase green.
      const calendarPalette = () =>
        globalThis.appIsDark()
          ? { noData: '#1f1f1f', cellStroke: '#171717', label: '#a1a1a1', year: '#3ecf8e' }
          : { noData: '#f0f0f0', cellStroke: '#fcfcfc', label: '#6e6e6e', year: '#26a069' };

      const tooltipDateFormatter = new Intl.DateTimeFormat('en-US', {
        month: 'long',
        day: 'numeric',
        year: 'numeric',
      });

      const dateTooltip = (date) =>
        `<div style="font-size:1rem;padding:0.75rem;white-space:nowrap;">${tooltipDateFormatter.format(date)}</div>`;

      // Google applies a hard-coded light hover treatment to days absent from
      // the data table. Add those days as zero-valued rows so they use the
      // themed color axis and HTML tooltip in both color modes.
      const completeCalendarRows = (rows) => {
        const year = rows[0]?.y;
        if (!Number.isInteger(year)) return rows;

        const present = new Set(rows.map((r) => `${r.y}-${r.m}-${r.d}`));
        const completed = [...rows];
        const date = new Date(year, 0, 1);

        while (date.getFullYear() === year) {
          const y = date.getFullYear();
          const m = date.getMonth() + 1;
          const d = date.getDate();
          if (!present.has(`${y}-${m}-${d}`)) {
            completed.push({ y, m, d, v: 0, tooltip: dateTooltip(date) });
          }
          date.setDate(date.getDate() + 1);
        }

        return completed;
      };

      const calendarOptions = (container) => {
        const p = calendarPalette();
        // Fit the chart to the card it lives in: shrink the cells until the
        // full year fits (53 week columns + year label), but not below 8px —
        // past that the wrapper scrolls horizontally instead.
        let available = 950;
        if (container) {
          const cs = getComputedStyle(container);
          available = container.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
        }
        const cellSize = Math.max(8, Math.min(16, Math.floor((available - 70) / 53)));
        return {
          tooltip: { isHtml: true },
          height: Math.round(200 * (cellSize / 16)),
          width: Math.min(950, Math.max(available, cellSize * 53 + 70)),
          backgroundColor: 'transparent',
          colorAxis: { minValue: 0, maxValue: 1, colors: [p.noData, '#3ecf8e'] },
          noDataPattern: { backgroundColor: p.noData, color: p.noData },
          calendar: {
            cellSize,
            yearLabel: { fontName: 'Helvetica', color: p.year, bold: true },
            cellColor: { stroke: p.cellStroke, strokeWidth: 2.5 },
            focusedCellColor: { stroke: '#3ecf8e' },
            monthOutlineColor: { strokeOpacity: 0 },
            unusedMonthOutlineColor: { strokeOpacity: 0 },
            dayOfWeekLabel: {
              fontName: 'Helvetica',
              fontSize: 12,
              color: p.label,
            },
            monthLabel: { fontName: 'Helvetica', fontSize: 12, color: p.label },
            daysOfWeek: ' M W F',
          },
        };
      };

      // rows: [{ y, m, d, v, tooltip }] — retries until the charts package
      // is loaded and the container exists; a token cancels stale draws.
      let drawToken = 0;
      globalThis['appDrawCalendar'] = function (rows) {
        const token = ++drawToken;
        let attempts = 0;

        const attempt = () => {
          if (token !== drawToken || attempts++ > 100) return;
          const el = document.getElementById('calendar-chart');
          const g = globalThis.google;
          if (!el || !g || !g.visualization || !g.visualization.Calendar) {
            setTimeout(attempt, 100);
            return;
          }
          const table = new g.visualization.DataTable();
          table.addColumn({ type: 'date', id: 'Date' });
          table.addColumn({ type: 'number', id: 'Readings' });
          table.addColumn({ type: 'string', role: 'tooltip', p: { html: true } });
          table.addRows(
            completeCalendarRows(rows).map((r) => {
              const date = new Date(r.y, r.m - 1, r.d);
              return [date, r.v, r.tooltip || dateTooltip(date)];
            }),
          );
          new g.visualization.Calendar(el).draw(table, calendarOptions(el.parentElement));
        };

        attempt();
      };
    </script>
  </head>

  <body>
    <script src="index.js" type="module"></script>
  </body>
</html>
